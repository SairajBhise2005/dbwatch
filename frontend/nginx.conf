# nginx serves the built React app and proxies /api to the backend.
# This makes the whole dashboard same-origin, so no CORS is needed
# and the frontend can call "/api/..." directly.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API → backend container (see docker-compose service name).
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
