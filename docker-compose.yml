# DBWatch — runs the whole dashboard on your EC2 instance.
#
#   frontend (nginx, port 80)  ──/api──▶  backend (node, 3001)  ──▶  AWS RDS PostgreSQL
#
# The backend connects to the managed RDS instance over the network
# (DB_HOST = RDS endpoint, DB_SSL=true), set in backend/.env. Only port
# 80 is published; RDS stays private to the EC2 security group.
#
# (For the older self-managed setup — Postgres on the EC2 host — you
#  would instead set DB_HOST: host.docker.internal + extra_hosts here.)

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGIN: http://localhost
      # Isolation Forest sidecar (primary anomaly detector). If this is
      # down the backend falls back to its built-in z-score detector.
      ANOMALY_SERVICE_URL: http://anomaly-service:8000
    volumes:
      # Persist backups on the host so they survive container restarts.
      - ./backups:/app/backups
    expose:
      - '3001'

  # ML anomaly detection (multivariate Isolation Forest). Stateless,
  # not published — only the backend talks to it over the compose network.
  anomaly-service:
    build: ./anomaly-service
    restart: unless-stopped
    expose:
      - '8000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
